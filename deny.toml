# cargo-deny configuration for MinecrarchOS
# Enforces license policy and bans problematic external crates.
# Run: cargo deny check
# CI: enabled in ci.yml once the Cargo workspace has members.

[graph]
# All workspace members are checked
targets = []

# ── License policy ────────────────────────────────────────────────────────────
[licenses]
# Only allow GPL-compatible licenses (MinecrarchOS targets GPLv3/MIT/Apache-2.0)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
    "GPL-3.0",
    "GPL-2.0",
    "LGPL-3.0",
    "LGPL-2.1",
]
deny = [
    # Proprietary or non-distributable
    "SSPL-1.0",
    "BUSL-1.1",
]
unlicensed = "deny"
copyleft = "warn"

# ── Banned external crates ────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

deny = [
    # No OpenSSL — use rustls for TLS
    { name = "openssl" },
    { name = "openssl-sys" },

    # No Tokio in shared/ — shared must be runtime-agnostic
    # (enforced per-crate rather than globally — see layers.md)

    # No direct GUI frameworks in services — services are headless
    { name = "gtk4", wrappers = ["minecrarch-modpack-manager", "minecrarch-overlay", "minecrarch-logging", "minecrarch-updater", "minecrarch-runtime"] },
]

skip = []
skip-tree = []

# ── Security advisories ───────────────────────────────────────────────────────
# Advisories not checked in CI (requires network + advisory DB fetch).
# Run locally: cargo deny check advisories
[advisories]
version = 2
yanked = "deny"

# ── Source policy ─────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
