# mkinitcpio configuration for MinecrarchOS (linux-zen)
# Target: btrfs root, no LVM/LUKS in Phase 3. Encryption is a future consideration.

MODULES=()
BINARIES=()
FILES=()

# Standard hooks. btrfs kernel module is loaded by the `filesystems` hook
# automatically — no explicit btrfs hook needed.
HOOKS=(base udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)
