# pacman.conf for MinecrarchOS ISO build
# Based on the standard Arch Linux pacman.conf.

[options]
HoldPkg      = pacman glibc
Architecture = auto

Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 5

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ── Official repositories ─────────────────────────────────────────────────────
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

# ── Custom MinecrarchOS repository (P3-D5) ────────────────────────────────────
# Provides: minecrarch-core, minecrarch-session
# Built from packages/ PKGBUILDs and signed with the project GPG key.
# Uncomment when the repository is available.
#
# [minecrarch]
# SigLevel = Required
# Server = https://repo.minecrarchos.example/$arch
