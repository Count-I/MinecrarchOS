# git-cliff configuration
# Generates CHANGELOG.md from Conventional Commits

[changelog]
header = """
# Changelog

All notable changes to MinecrarchOS are documented here.
Format based on [Keep a Changelog](https://keepachangelog.com/).
Commits follow [Conventional Commits](https://www.conventionalcommits.org/).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING:** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Count-I/MinecrarchOS/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""

footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI/CD" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore", group = "Maintenance" },
]

filter_commits = false
tag_pattern = "v[0-9].*|20[0-9][0-9]\\.[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
