name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # Validate PR title follows Conventional Commits
  # With squash merge, PR title becomes the commit on main
  # ─────────────────────────────────────────────
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            ci
            docs
            test
            build
            chore
          scopes: |
            shell
            services
            runtime
            session
            iso
            packaging
            infra
            docs
            ci
            adr
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: >
            The subject must start with a lowercase letter and must not end with a period.

  # ─────────────────────────────────────────────
  # Lint all Markdown documentation
  # ─────────────────────────────────────────────
  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          globs: |
            **/*.md
            !CHANGELOG.md

