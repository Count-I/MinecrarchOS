name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # Validate PR title follows Conventional Commits
  # With squash merge, PR title becomes the commit on main
  # ─────────────────────────────────────────────
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            ci
            docs
            test
            build
            chore
          scopes: |
            shell
            services
            runtime
            session
            iso
            packaging
            infra
            docs
            ci
            adr
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: >
            The subject must start with a lowercase letter and must not end with a period.

  # ─────────────────────────────────────────────
  # Lint all Markdown documentation
  # ─────────────────────────────────────────────
  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          globs: |
            **/*.md
            !CHANGELOG.md

  # ─────────────────────────────────────────────
  # ADR enforcement: PRs touching architecture-relevant
  # files must reference an ADR or state N/A
  # ─────────────────────────────────────────────
  adr-check:
    name: ADR reference check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check ADR reference in PR
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # PRs with these types are exempt from ADR requirement
          if echo "$PR_TITLE" | grep -qE '^(docs|ci|chore|test)\('; then
            echo "Exempt PR type — no ADR required."
            exit 0
          fi

          # Check for ADR reference or explicit N/A
          if echo "$PR_BODY" | grep -qE 'ADR-[0-9]{4}|ADR:\s*N/A|No ADR required'; then
            echo "ADR reference found."
            exit 0
          fi

          echo "ERROR: This PR must reference an ADR in the description." >&2
          echo "  - Reference a specific ADR: 'ADR-0009'" >&2
          echo "  - Or state explicitly: 'ADR: N/A' with a reason" >&2
          echo "  - Or 'No ADR required: <reason>'" >&2
          echo "See docs/adr/README.md for guidance." >&2
          exit 1

  # ─────────────────────────────────────────────
  # Dependency boundary enforcement
  # Validates no component imports a forbidden component
  # Runs when any Cargo.toml changes
  # ─────────────────────────────────────────────
  check-deps:
    name: Dependency boundary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency boundary checker
        run: bash tools/check-deps.sh

  # ─────────────────────────────────────────────
  # cargo-deny — license and crate policy
  # ─────────────────────────────────────────────
  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses bans sources

  # ─────────────────────────────────────────────
  # Rust workspace build and lint
  # ─────────────────────────────────────────────
  build-rust:
    name: Build Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 and libadwaita system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libwayland-dev \
            meson \
            ninja-build \
            pkg-config
      - name: Build and install gtk4-layer-shell from source
        run: |
          git clone --depth=1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4ls
          meson setup /tmp/gtk4ls/build /tmp/gtk4ls \
            --prefix=/usr \
            -Dexamples=false -Ddocs=false -Dtests=false -Dintrospection=false
          sudo ninja -C /tmp/gtk4ls/build install
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  # ─────────────────────────────────────────────
  # Phase 1: Validate PKGBUILDs with namcap
  # Uncomment when packaging/ contains PKGBUILDs
