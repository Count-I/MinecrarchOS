name: Release

on:
  push:
    tags:
      - 'v*'         # v0.1-alpha, v1.0-beta, v1.0
      - '20[0-9][0-9].*'  # 2026.08, 2027.01 (calendar versioning)

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      # ─── Generate changelog from conventional commits since last tag ──────
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose --latest
        env:
          OUTPUT: RELEASE_NOTES.md

      # ─── Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'preview') }}
          # files: (Phase 1+) signed ISO attached here

      # ─── Update CHANGELOG.md in repo ────────────────────────────────────
      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(changelog): update for ${{ github.ref_name }}"
          file_pattern: CHANGELOG.md
          branch: main

