name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'  # UTC midnight, every day
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  nightly-build:
    name: Nightly build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Current: validate docs are consistent ───────────────────────────
      - name: Check docs consistency
        run: |
          # Verify all ADRs referenced in the index actually exist
          while IFS= read -r adr_file; do
            if [ ! -f "$adr_file" ]; then
              echo "ERROR: Referenced ADR file missing: $adr_file"
              exit 1
            fi
          done < <(grep -oP 'docs/adr/\S+\.md' docs/adr/README.md)
          echo "All referenced ADR files exist."

